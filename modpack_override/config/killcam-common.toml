
["Kill Cam Settings"]
	#Enable the Kill Cam time slow feature
	enableKillCam = true
	#Ticks before time slow starts
	delayBegin = 6
	#Ticks before time speed returns to normal
	delayEnd = 11
	#Time slow speed (lower is slower, 20.0 is normal)
	amplifier = 2
	#Kill Cam FOV
	killCamFov = 0.45
	#Entities that ALWAYS trigger kill cam (Highest priority) (format: modid:entity_id)
	whitelist = []
	#Entities that NEVER trigger kill cam (format: modid:entity_id)
	blacklist = ["minecraft:silverfish"]
	#Minimum max health of the entity to trigger time slow
	minMaxHealth = 50.0
	#Trigger kill cam if it's a boss
	bossCheckEnabled = true
	#Trigger kill cam if it's the last enemy in the area
	lastEnemyEnabled = false
	#Radius to check for nearby enemies
	lastEnemyRadius = 16.0

